name: reproduce

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  reproduce:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: pytest -v
      - run: python ./src/recompute_gr_summary.py
      - run: python ./src/compare_gap_definitions.py
      - run: python ./src/make_figures.py
      - if: matrix.os == 'ubuntu-latest'
        run: |
          cd data
          sha256sum -c SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            outputs/
            paper/figures/
          retention-days: 30
